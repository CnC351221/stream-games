name: Build Stream Games

on:
  # Запускается при пуше в основную ветку
  push:
    branches:
      - main
    tags:
      - 'v*'
  # Запускается вручную из GitHub
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        env:
          npm_config_runtime: electron
          npm_config_target: 40.4.1
          npm_config_build_from_source: true

      - name: Rebuild native modules
        run: npm run rebuild || true # Игнорируем ошибки опциональных модулей

      - name: Build for ${{ matrix.platform }}
        run: npm run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stream-games-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
          if-no-files-found: warn
