<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ava Preview</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-wrap: wrap; gap: 10px; padding: 20px; }
        .box { text-align: center; }
        img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid #fff; }
    </style>
</head>
<body>
    <script src="gen_ava_generator.js"></script>
    <script>
        for (let i = 0; i < 10; i++) {
            const seed = "Test" + i;
            const url = RandomAvatarGenerator.generate(seed);
            document.body.innerHTML += `
                <div class="box">
                    <img src="${url}">
                    <div style="font-size:10px">${seed}</div>
                </div>
            `;
        }
    </script>
</body>
</html>
